<app-card>
  <img card-title src="icones/saldo.svg" alt="" />
  <h2 card-title class="texto-lg">Saldo disponível:</h2>
  <span
    card-body
    class="valor texto-xxxl"
    [appDestaqueValorNumerico]="saldo()"
    corPositiva="var(--violeta-destaque)"
  >
    {{ saldo() | currency: "BRL" }}
  </span>
</app-card>
