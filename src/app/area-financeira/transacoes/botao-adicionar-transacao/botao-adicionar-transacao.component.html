<app-botao (click)="openModalDialog()">
  <img class="icone-moeda" src="icones/moeda.svg" alt="" />
  Adicionar Transação
</app-botao>

<app-modal [(open)]="openModal">
  <ng-container header>
    <img src="icones/moeda.svg" alt="" />
    <h2 class="text-xl">Adicionar transação</h2>
  </ng-container>
  <ng-container body>
    <form
      class="form text-md"
      [formGroup]="formTransaction"
      (ngSubmit)="submitForm()"
    >
      <label class="label-grupo">
        Nome da transação
        <input
          formControlName="name"
          class="input"
          type="text"
          name="nome-transacao"
        />
      </label>

      <fieldset class="grupo-tipo-transacao" required>
        <legend class="legend">Tipo da transação</legend>

        @for (ttype of transactionTypes | keyvalue; track ttype.key) {
          <label class="label-grupo-radio">
            <input
              formControlName="type"
              type="radio"
              [value]="ttype.value"
              required
            />
            <span>{{ ttype.value }}</span>
          </label>
        }
      </fieldset>

      <label class="label-grupo">
        Valor
        <input
          formControlName="value"
          class="input"
          type="number"
          name="valor-transacao"
          min="0.01"
          step="0.01"
          placeholder="R$ 500,00"
          required
        />
      </label>

      <label class="label-grupo">
        Data da transação
        <input
          formControlName="creationDate"
          class="input"
          type="date"
          name="data-transacao"
          required
        />
      </label>

      <label class="label-grupo">
        Conta Bancária
        <select
          formControlName="accountBankType"
          name="conta-transacao"
          class="input select-conta-transacao"
          required
        >
          <option value="" selected disabled>Selecione a conta</option>
          @for (bank of bankTypes | keyvalue; track bank.key) {
            <option [value]="bank.value">{{ bank.value | titlecase }}</option>
          }
        </select>
      </label>

      <app-botao class="botao-adicionar-transacao"> Adicionar </app-botao>
    </form>
  </ng-container>
</app-modal>
